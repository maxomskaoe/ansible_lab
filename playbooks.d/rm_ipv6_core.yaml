---
- name: remove_ipv6_core
  hosts: all
  become: yes
  become_method: sudo
  
  tasks:
    # disable ipv6
    - name: disable_ipv6_core
      sysctl:
        name: "{{item}}"
        value: '1'
        state: present
        reload: yes
      loop:
        - net.ipv6.conf.all.disable_ipv6
        - net.ipv6.conf.default.disable_ipv6
        - net.ipv6.conf.lo.disable_ipv6 
